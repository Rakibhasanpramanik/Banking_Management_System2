{% extends "base.html" %}
{% block title %}Add Employee{% endblock %}
{% block page_title %}Add Employee{% endblock %}
{% block content %}
<div class="page-actions"><a href="{{ url_for('employees') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a></div>
<div class="card form-card">
    <div class="card-header"><h2><i class="fas fa-user-tie"></i> Employee Details</h2></div>
    <div class="card-body">
        <form method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label>Branch</label>
                    <select name="branch_id" required>
                        <option value="">-- Select Branch --</option>
                        {% for b in branches %}
                        <option value="{{ b.branch_id }}">{{ b.branch_name }} ({{ b.bank_name }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group"><label>First Name</label><input type="text" name="first_name" required></div>
                <div class="form-group"><label>Last Name</label><input type="text" name="last_name" required></div>
                <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
                <div class="form-group"><label>Phone</label><input type="text" name="phone"></div>
                <div class="form-group"><label>Position</label><input type="text" name="position" placeholder="e.g. Teller, Manager"></div>
                <div class="form-group"><label>Salary (৳)</label><input type="number" name="salary" step="0.01"></div>
                <div class="form-group"><label>Hire Date</label><input type="date" name="hire_date"></div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Employee</button>
                <a href="{{ url_for('employees') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
