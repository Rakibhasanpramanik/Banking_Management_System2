{% extends "base.html" %}
{% block title %}Open Account{% endblock %}
{% block page_title %}Open New Account{% endblock %}
{% block content %}
<div class="page-actions">
    <a href="{{ url_for('accounts') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card form-card">
    <div class="card-header"><h2><i class="fas fa-credit-card"></i> Account Details</h2></div>
    <div class="card-body">
        <form method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label>Customer</label>
                    <select name="customer_id" required>
                        <option value="">-- Select Customer --</option>
                        {% for c in customers %}
                        <option value="{{ c.customer_id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select name="account_type" required id="account_type" onchange="toggleFields()">
                        <option value="">-- Select Type --</option>
                        <option value="saving">Saving Account</option>
                        <option value="current">Current Account</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Initial Deposit (৳)</label>
                    <input type="number" name="balance" step="0.01" min="0" placeholder="0.00" required>
                </div>
                <!-- Saving fields -->
                <div id="saving_fields" style="display:none" class="form-group">
                    <label>Interest Rate (%)</label>
                    <input type="number" name="interest_rate" step="0.01" value="4.50">
                </div>
                <div id="saving_min" style="display:none" class="form-group">
                    <label>Minimum Balance (৳)</label>
                    <input type="number" name="min_balance" value="1000">
                </div>
                <!-- Current fields -->
                <div id="current_fields" style="display:none" class="form-group">
                    <label>Overdraft Limit (৳)</label>
                    <input type="number" name="overdraft_limit" value="0">
                </div>
                <div id="current_fee" style="display:none" class="form-group">
                    <label>Monthly Fee (৳)</label>
                    <input type="number" name="monthly_fee" value="0">
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Open Account</button>
                <a href="{{ url_for('accounts') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
function toggleFields() {
    const type = document.getElementById('account_type').value;
    document.getElementById('saving_fields').style.display = type === 'saving' ? 'block' : 'none';
    document.getElementById('saving_min').style.display = type === 'saving' ? 'block' : 'none';
    document.getElementById('current_fields').style.display = type === 'current' ? 'block' : 'none';
    document.getElementById('current_fee').style.display = type === 'current' ? 'block' : 'none';
}
</script>
{% endblock %}
